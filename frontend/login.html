<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
     <title>Login - KIZORA</title>
      <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to bottom, #0b0f1a, #02040a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: #111;
            padding: 40px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #1e90ff;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        h2 {
            margin-bottom: 20px;
        }
  
      </style>

    </head>

<body>

<div class="login-box">
    <h2>KIZORA Login</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button class="btn">Login</button>
</div>    
    
</body>
</html>
